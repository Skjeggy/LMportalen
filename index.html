<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALIS Søkeportal</title>
    <link rel="icon" type="image/png" href="./images/favicon.png">
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <main class="page">

      <div class="top-panel">

        <header class="page-header">
          <a href="https://alis.no">
      <img src="./images/ALIS_logo.png" alt="ALIS logo" class="page-logo" />
          </a>
          <h1 class="page-title">Søkeportal</h1>
        </header>

        <div class="controls">
          <select id="datasetSelect" class="control-select">
            <option value="lm">ALM læringsmål</option>
            <option value="sam">SAM læringsmål</option>
            <option value="fkm">FKM læringsmål</option>
          </select>

          <input
            id="searchInput"
            class="control-input"
            type="search"
            placeholder="Søk…"
            autocomplete="off"
          />

          <select id="categorySelect" class="control-select">
            <option value="all">Alle tema</option>
          </select>

          <select id="formSelect" class="control-select">
            <option value="all">Alle læringsformer</option>
          </select>
        </div>

      </div>

      <section class="acc" id="acc"></section>

      <div class="page-footer-space">
        <footer id="pageFooter" class="page-footer">
          Sondre • Apollo prosjekt
        </footer>
</div>

    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
