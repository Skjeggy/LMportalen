<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALIS Søkeportal</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>

    <img src="./alis-logo.png" class="alis-logo" alt="ALIS logo" />


    <main class="page">
      <h1 class="page-title">ALIS - Søkeportal</h1>

      <!-- Controls (search + tema + code + læringsform) -->
      <div class="controls">
        <input
          id="searchInput"
          class="control-input"
          type="search"
          placeholder="Søk…"
          autocomplete="off"
        />

        <select id="categorySelect" class="control-select">
          <option value="all">Alle domener</option>
        </select>


        <select id="formSelect" class="control-select">
          <option value="all">Alle læringsformer</option>
        </select>
      </div>

      <!-- JS will fill this -->
      <section class="acc" id="acc"></section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
